site_name: Save PES
site_description: Independent analysis and community action for Pownal Elementary School
site_url: https://savepes.com/

docs_dir: website

theme:
  name: material
  palette:
    scheme: default
    primary: custom
    accent: custom
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.tooltips
  icon:
    logo: material/school
    repo: fontawesome/brands/github

repo_url: https://github.com/bsplosion/rsu-5-analysis-2026
repo_name: View Source Data

nav:
  - Home: index.md
  - The Situation: situation.md
  - Our Analysis: analysis.md
  - Key Facts & FAQ: key-facts.md
  - Resources & Downloads: resources.md
  - Take Action: get-involved.md

markdown_extensions:
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search

extra:
  generator: false

extra_css:
  - stylesheets/pownal.css

copyright: >-
  Save PES &mdash; Pownal parents, educators, and community members.
  All analysis is cited, verifiable, and open source.
  Contact: <a href="mailto:savepownalelementary@gmail.com">savepownalelementary@gmail.com</a>
