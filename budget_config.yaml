# RSU 5 Budget Analysis Configuration
#
# This file defines the RSU 5 organizational structure and all manually-
# sourced data that cannot be parsed from budget CSVs.  It is the single
# place to update when a new fiscal year is added or a figure is corrected.
#
# RECONCILIATION RULE: Any value added here that corresponds to a figure
# the district publishes must be verified against the source document.
# See RECONCILIATION.md for the standing policy.

# ─── Cost Centers ───────────────────────────────────────────────
cost_centers:
  "010": {name: "Durham Community School",   abbrev: "DCS", grades: "PreK-8"}
  "020": {name: "Morse Street School",       abbrev: "MSS", grades: "PreK-2"}
  "030": {name: "Pownal Elementary School",   abbrev: "PES", grades: "PreK-5"}
  "040": {name: "Mast Landing School",        abbrev: "MLS", grades: "3-5"}
  "050": {name: "Freeport Middle School",     abbrev: "FMS", grades: "6-8"}
  "300": {name: "Freeport High School",       abbrev: "FHS", grades: "9-12"}
  "900": {name: "System Wide",               abbrev: "SYS"}
  "941": {name: "Shared Utilities",           abbrev: "UTIL"}
  "950": {name: "K-8 District-Wide",          abbrev: "K8"}
  "990": {name: "9-12 District-Wide",         abbrev: "912"}
  "000": {name: "Unassigned / Overhead",      abbrev: "CTRL"}

# ─── Articles ───────────────────────────────────────────────────
articles:
  1:  {name: "Regular Instruction",           allocated_to_schools: true}
  2:  {name: "Special Education",             allocated_to_schools: true}
  3:  {name: "Career & Technical Education",  allocated_to_schools: false}
  4:  {name: "Other Instruction",             allocated_to_schools: true}
  5:  {name: "Student & Staff Support",       allocated_to_schools: true}
  6:  {name: "System Administration",         allocated_to_schools: false}
  7:  {name: "School Administration",         allocated_to_schools: true}
  8:  {name: "Transportation & Buses",        allocated_to_schools: false}
  9:  {name: "Facilities & Maintenance",      allocated_to_schools: true}
  10: {name: "Debt Service",                  allocated_to_schools: false}
  11: {name: "All Other Expenses",            allocated_to_schools: false}

# ─── Object Code Categories ────────────────────────────────────
# First two digits of the 5-digit object code determine the category.
object_categories:
  "51": "Salaries & Wages"
  "52": "Benefits"
  "53": "Purchased Services"
  "54": "Equipment & Repairs"
  "55": "Travel"
  "56": "Supplies & Utilities"
  "57": "Equipment (Capital)"
  "58": "Debt / Dues & Fees"
  "59": "Other Expenditures"

# ─── Account Code Format ───────────────────────────────────────
# Fund.Program.Function.Object.CostCenter (5 segments)
# Adopted/citizens budgets use dots; worksheets use hyphens.
account_code:
  segments: [fund, program, function, object_code, cost_center]
  dot_pattern: '(\d{4})\.(\d{4})\.(\d{4})\.(\d{5})\.(\d{3})'
  hyphen_pattern: '(\d{4})-(\d{4})-(\d{4})-(\d{5})-(\d{3})'

# ─── Article Detection ─────────────────────────────────────────
# Maps function-code ranges to article numbers for line-item classification.
# The budget articles documents group by article, but the account code
# function field also implies the article.
function_to_article:
  "1000": 1   # Regular Instruction
  "1100": 1   # (also Regular Instruction sub-functions)
  "1200": 1
  "1300": 4   # Other Instruction (co-curricular)
  "2100": 5   # Student Support (guidance, health)
  "2200": 5   # Staff Support (tech, assessment, PD)
  "2210": 5
  "2220": 5
  "2230": 5
  "2240": 5
  "2300": 6   # System Administration (board, supt)
  "2310": 6
  "2320": 6
  "2400": 7   # School Administration (principals)
  "2500": 5   # Central services -> Student & Staff Support
  "2600": 9   # Facilities & Maintenance
  "2620": 9
  "2680": 10  # Debt Service
  "2690": 9   # Capital
  "2700": 8   # Transportation
  "3000": 3   # CTE
  "3300": 3
  "4000": 4   # Other Instruction
  "4100": 4
  "4200": 4
  "4900": 4
  "5000": 2   # Special Education
  "5100": 2
  "5200": 2

# ─── CSV Column Layouts by Document Type ───────────────────────
# Each document type has a different set of year columns.  The parser
# uses these to map CSV column positions to semantic column names.
column_layouts:
  board-adopted-budget:
    FY22: ["FY18 Actual", "FY19 Actual", "FY20 Actual", "FY21 Adopted", "FY22 Adopted", "Dollar Difference", "Percent Difference"]
    FY23: ["FY19 Actual", "FY20 Actual", "FY21 Actual", "FY22 Adopted", "FY23 Adopted", "Dollar Difference", "Percent Difference"]
    FY24: ["FY20 Actual", "FY21 Actual", "FY22 Actual", "FY23 Adopted", "FY24 Adopted", "Dollar Difference", "Percent Difference"]
    FY25: ["FY21 Actual", "FY22 Actual", "FY23 Actual", "FY24 Adopted", "FY25 Adopted", "Dollar Difference", "Percent Difference"]
    FY26: ["FY22 Actual", "FY23 Actual", "FY24 Actual", "FY25 Adopted", "FY26 Adopted", "Dollar Difference", "Percent Difference"]

  citizens-adopted-budget:
    FY22: ["FY18 Actual", "FY19 Actual", "FY20 Actual", "FY21 Adopted", "FY22 Adopted", "Dollar Difference", "Percent Difference"]
    FY23: ["FY19 Actual", "FY20 Actual", "FY21 Actual", "FY22 Adopted", "FY23 Adopted", "Dollar Difference", "Percent Difference"]
    FY24: ["FY20 Actual", "FY21 Actual", "FY22 Actual", "FY23 Adopted", "FY24 Adopted", "Dollar Difference", "Percent Difference"]
    FY25: ["FY21 Actual", "FY22 Actual", "FY23 Actual", "FY24 Adopted", "FY25 Adopted", "Dollar Difference", "Percent Difference"]
    FY26: ["FY22 Actual", "FY23 Actual", "FY24 Actual", "FY25 Adopted", "FY26 Adopted", "Dollar Difference", "Percent Difference"]

  budget-articles:
    FY23: ["FY19 Actual", "FY20 Actual", "FY21 Actual", "FY22 Adopted", "FY23 Proposed", "Dollar Difference", "Percent Difference"]
    FY24: ["FY20 Actual", "FY21 Actual", "FY22 Actual", "FY23 Adopted", "FY24 Proposed", "Dollar Difference", "Percent Difference"]
    FY25: ["FY21 Actual", "FY22 Actual", "FY23 Actual", "FY24 Adopted", "FY25 Proposed", "Dollar Difference", "Percent Difference"]
    FY26: ["FY22 Actual", "FY23 Actual", "FY24 Actual", "FY25 Adopted", "FY26 Proposed", "Dollar Difference", "Percent Difference"]
    FY27: ["FY23 Actual", "FY24 Actual", "FY25 Actual", "FY26 Adopted", "FY27 Proposed", "Dollar Difference", "Percent Difference"]

  budget-worksheet:
    FY22: ["FY19 Budget", "FY19 Activity", "FY20 Budget", "FY20 Activity", "FY21 Budget", "FY21 YTD", "FY22 Proposed", "Dollar Difference", "Percent Difference"]

# ─── Documents Available per FY ────────────────────────────────
# Which CSV file prefixes contain line-item budget data suitable for
# ingestion.  Handbooks and overviews are narrative and excluded.
line_item_documents:
  FY22: ["FY22-citizens-adopted-budget", "FY22-budget-worksheet"]
  FY23: ["FY23-board-adopted-budget", "FY23-citizens-adopted-budget", "FY23-budget-articles"]
  FY24: ["FY24-board-adopted-budget", "FY24-citizens-adopted-budget", "FY24-budget-articles"]
  FY25: ["FY25-board-adopted-budget", "FY25-citizens-adopted-budget", "FY25-budget-articles"]
  FY26: ["FY26-board-adopted-budget", "FY26-citizens-adopted-budget", "FY26-budget-articles"]
  FY27: ["FY27-budget-articles"]

# ─── Preferred Document per FY ──────────────────────────────────
# When multiple documents exist for a fiscal year, this is the one
# to use as the primary baseline.  Others serve as cross-checks.
preferred_document:
  FY22: "FY22-citizens-adopted-budget"
  FY23: "FY23-board-adopted-budget"
  FY24: "FY24-board-adopted-budget"
  FY25: "FY25-board-adopted-budget"
  FY26: "FY26-board-adopted-budget"
  FY27: "FY27-budget-articles"

